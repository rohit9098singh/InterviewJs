<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Debounce Example</title>
</head>

<body>

    <h2>Debounced Search</h2>   
    <input type="text" placeholder="Type to search..." onkeyup="betterFunction(event)" /> 
    <script>
        let count = 0;

        const getData = async (e) => {
            const query = e.target.value.trim();  // use ka value

            if (!query) return;  

            console.log(`API Call #${++count} with query: ${query}`);

            try {
                const response = await fetch(
                    `https://dummyjson.com/products/search?q=${query}`
                );

                if (!response.ok) {
                    throw new Error("Network response was not ok");
                }

                const data = await response.json();

                console.log("Products:", data.products);
            } catch (error) {
                console.error("Error fetching products:", error);
            }
        };

        const doSomeMagic = (fn, delay) => {
            let timer;
            return function (...args) {
                clearTimeout(timer);  // isko koi use nhi hai 
                timer = setTimeout(() => {
                    fn.apply(this, args);
                }, delay);
            };
        };

        const betterFunction = doSomeMagic(getData, 500);
    </script>
</body>

</html>
